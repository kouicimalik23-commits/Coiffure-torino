<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coiffure Torino Booking App</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <header class="bg-blue-500 p-4 text-white text-center">
        <h1 class="text-3xl">Coiffure Torino Barber Shop</h1>
    </header>

    <main class="container mx-auto mt-5">
        <h2 class="text-2xl mb-4">Book Your Appointment</h2>
        <form id="booking-form" class="bg-white p-6 rounded shadow-md">
            <div class="mb-4">
                <label class="block mb-2" for="name">Name:</label>
                <input type="text" id="name" class="border rounded w-full p-2" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2" for="date">Date:</label>
                <input type="date" id="date" class="border rounded w-full p-2" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2" for="time">Time:</label>
                <input type="time" id="time" class="border rounded w-full p-2" required>
            </div>
            <button type="submit" class="bg-blue-500 text-white rounded p-2">Book Appointment</button>
        </form>
        <div id="confirmation" class="mt-4"></div>
    </main>

    <footer class="bg-blue-500 p-4 text-white text-center mt-5">
        <p>&copy; 2026 Coiffure Torino. All rights reserved.</p>
    </footer>

    <script>
        $(document).ready(function() {
            $('#booking-form').on('submit', function(e) {
                e.preventDefault();
                const name = $('#name').val();
                const date = $('#date').val();
                const time = $('#time').val();
                $('#confirmation').html(`<p class='text-green-500'>Thank you ${name}! Your appointment is booked for ${date} at ${time}.</p>`);
            });
        });
    </script>
</body>
</html>
